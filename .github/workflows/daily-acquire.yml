name: Daily News Acquire

on:
  schedule:
    # Run at 01:17 UTC (09:17 CST) every day — offset to avoid top-of-hour congestion
    - cron: '17 1 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  acquire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Acquire & Classify News
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "📅 Acquiring news for $DATE"

          # Fetch from all sources with auto-classification
          python3 scripts/acquire.py --source all --limit 20 --classify > /tmp/news-items.json 2>/tmp/acquire-log.txt

          # Show acquisition log
          cat /tmp/acquire-log.txt

          # Count items
          TOTAL=$(python3 -c "import json; print(len(json.load(open('/tmp/news-items.json'))))")
          echo "Fetched $TOTAL items"

          # Generate daily report
          python3 -c "
          import json, datetime
          items = json.load(open('/tmp/news-items.json'))
          date = datetime.date.today().isoformat()
          tier_counts = {}
          for i in items:
              t = i.get('tier', 'unknown')
              tier_counts[t] = tier_counts.get(t, 0) + 1

          report = f'''---
          title: \"📰 Daily Acquire Report — {date}\"
          date: {date}
          source: multi-source
          tier: mixed
          status: inbox
          importance: 3
          tags:
            - news/daily-report
          ---

          # 📰 Daily Acquire Report — {date}

          > Auto-generated by GitHub Actions.

          ## 📊 Statistics
          | Metric | Value |
          |--------|-------|
          | Total Fetched | {len(items)} |
          '''
          for t, c in sorted(tier_counts.items()):
              report += f'| {t} | {c} |\n'

          report += '\n## 📋 Items\n\n'
          for i in items:
              tier_emoji = {'1-Core-Decision': '🔴', '2-Cognitive-Framework': '🟡',
                           '3-Social-Connection': '🟢', '4-Professional': '🔵'}.get(i.get('tier',''), '⚪')
              report += f'- {tier_emoji} [{i.get(\"tier\",\"\")}] [{i.get(\"title\",\"\")}]({i.get(\"url\",\"\")}) ({i.get(\"source\",\"\")})\n'

          with open(f'Inbox/{date}-daily-report.md', 'w') as f:
              f.write(report)
          print(f'Generated report for {date}')
          "

      - name: Commit Report
        run: |
          git config user.name "NewsAI Bot"
          git config user.email "bot@newsai-cybernetics.dev"
          git add -A
          if git diff --staged --quiet; then
            echo "No new items to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "📰 Daily acquire: $DATE — auto-fetched via GitHub Actions"
            git push
          fi
